<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Destaques da Rádio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 0; }
        
        /* FAIXAS MAIS LARGAS (15px) */
        .barra-azul { width: 100%; height: 15px; background-color: #001f3f; }
        .barra-azul-rodape { width: 100%; height: 15px; background-color: #001f3f; margin-top: 15px; }

        .header-faixa { width: 100%; padding: 20px 18px 15px 18px; font-size: 24px; font-weight: 900; color: #001a33; text-transform: uppercase; display: flex; align-items: center; gap: 10px; box-sizing: border-box; }
        .header-faixa::before { content: ''; width: 6px; height: 24px; background: #d32f2f; border-radius: 2px; }

        .swiper { width: 100%; padding-bottom: 5px; }
        .swiper-slide { width: 88%; max-width: 420px; display: flex; flex-direction: column; background: #fff; }
        
        .media-container { width: 100%; position: relative; background: #ffffff; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 15px; }
        .media-container img, .media-container video { width: 100%; height: auto; max-height: 70vh; object-fit: contain; display: block; border-radius: 15px; }

        /* Botão de Play */
        .btn-play-video {
            position: absolute;
            width: 70px;
            height: 70px;
            background: rgba(211, 47, 47, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .btn-play-video::after {
            content: '';
            width: 0; height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 6px;
        }

        .info { padding: 18px 5px; position: relative; }
        .titulo-c { font-size: 20px; font-weight: 800; color: #001a33; line-height: 1.2; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .info h3 { margin: 0; font-size: 14px; font-weight: 700; color: #d32f2f; text-transform: uppercase; letter-spacing: 0.5px; }
        .info p { margin: 12px 0 0; font-size: 17px; font-weight: 500; color: #333; padding-right: 60px; line-height: 1.5; }

        /* Like */
        .like-container { position: absolute; right: 5px; top: 18px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .like-btn { font-size: 2rem; color: #ccc; }
        .like-btn.active { color: #d32f2f; }
        .like-count { font-size: 0.9rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div class="barra-azul"></div>
    <div class="header-faixa">Destaques da Semana</div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="container-radio"></div>
    </div>

    <div class="barra-azul-rodape"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const urlAppScript = "https://script.google.com/macros/s/AKfycbxNzDvifH0pv74i5E7BUS-scdfujI7mRLymYcOmCJDN3JH4AeGAThfHZoGDt2xS228zWw/exec?aba=Respostas ao formulário 1";

        async function curtir(linha, btnElement) {
            const countElement = btnElement.nextElementSibling;
            if(btnElement.classList.contains('active')) return;
            btnElement.classList.add('active');
            btnElement.innerHTML = "❤️";
            try {
                await fetch(urlAppScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ linha: linha }) });
                countElement.innerText = parseInt(countElement.innerText) + 1;
            } catch (e) {}
        }

        function iniciarVideo(el) {
            const video = el.querySelector('video');
            const playBtn = el.querySelector('.btn-play-video');
            if (video.paused) {
                video.play();
                if(playBtn) playBtn.style.display = 'none';
            } else {
                video.pause();
                if(playBtn) playBtn.style.display = 'flex';
            }
        }

        async function carregarPosts() {
            const container = document.getElementById('container-radio');
            try {
                const response = await fetch(urlAppScript);
                const dados = await response.json();
                const agora = new Date().getTime();
                
                // 7 dias em milissegundos
                const limite = 7 * 24 * 60 * 60 * 1000;

                container.innerHTML = dados.reverse().filter(item => {
                    if(!item.data) return false;
                    return (agora - new Date(item.data).getTime()) <= limite;
                }).map(item => {
                    const arquivo = (item.arquivo || item.link || "").trim();
                    const eVideo = /\.(mp4|mov|webm|ogg)$/i.test(arquivo);
                    
                    let midiaHtml = "";
                    if (eVideo) {
                        midiaHtml = `
                            <div class="media-container" onclick="iniciarVideo(this)">
                                <div class="btn-play-video"></div>
                                <video src="${arquivo}" playsinline loop></video>
                            </div>`;
                    } else {
                        const imgUrl = arquivo.includes('drive.google.com') ? 
                            `https://drive.google.com/thumbnail?id=${arquivo.match(/[-\w]{25,}/)[0]}&sz=w1000` : arquivo;
                        midiaHtml = `<div class="media-container"><img src="${imgUrl}"></div>`;
                    }

                    return `
                        <div class="swiper-slide">
                            ${midiaHtml}
                            <div class="info">
                                <span class="titulo-c">${item.titulo || ""}</span>
                                <h3>${item.apresentador || ""}</h3>
                                <p>${item.mensagem || ""}</p>
                                <div class="like-container" onclick="curtir(${item.id || item.linha}, this.querySelector('.like-btn'))">
                                    <span class="like-btn">🤍</span>
                                    <span class="like-count">${item.curtidas || 0}</span>
                                </div>
                            </div>
                        </div>`;
                }).join('');

                new Swiper(".mySwiper", { 
                    slidesPerView: "auto", 
                    centeredSlides: true, 
                    spaceBetween: 20, 
                    grabCursor: true 
                });
            } catch (error) { console.error(error); }
        }
        carregarPosts();
    </script>
</body>
</html>
