<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destaques da Rádio</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #121212; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .swiper { 
            width: 90%; 
            max-width: 450px; 
            background: #fff; 
            border-radius: 20px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .swiper-slide {
            display: flex;
            flex-direction: column;
            height: auto;
        }

        /* AJUSTE PARA NÃO CORTAR IMAGEM */
        .media-container { 
            width: 100%; 
            height: 400px; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .media-container img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; /* Garante que a imagem apareça inteira */
        }

        .media-container iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        .info { 
            padding: 20px; 
            text-align: center; 
            background: #fff;
            color: #333;
        }

        .info h3 { margin: 0; font-size: 1.3rem; color: #d32f2f; }
        .info p { margin: 10px 0 0; color: #555; font-size: 1rem; }

        /* Estilo das bolinhas de navegação */
        .swiper-pagination-bullet-active { background: #d32f2f !important; }
        
        .loading { padding: 50px; text-align: center; color: #888; }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="container-radio">
            <div class="loading">Buscando postagens...</div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const urlAppScript = "https://script.google.com/macros/s/AKfycbz3ERw84h_o1xHV0vONsKa6UaAt0XO0tni2gLDgxq9-n-oabdGtpXJeIUrFS3Lh8P2ahA/exec";

        async function carregarPosts() {
            const container = document.getElementById('container-radio');
            try {
                const response = await fetch(urlAppScript);
                const dados = await response.json();

                if (!dados || dados.length === 0) {
                    container.innerHTML = '<div class="loading">Nenhuma postagem encontrada.</div>';
                    return;
                }

                container.innerHTML = ''; // Limpa o carregando

                dados.forEach(item => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';

                    // Formata link de imagem para alta qualidade sem erro de carregamento
                    let linkMidia = item.link;
                    if (item.tipo === 'image') {
                        linkMidia = item.link.replace("uc?export=view&id=", "thumbnail?sz=w1000&id=");
                    }

                    const htmlMidia = item.tipo === 'video' 
                        ? `<iframe src="${item.link}" allow="autoplay"></iframe>` 
                        : `<img src="${linkMidia}" alt="Postagem">`;

                    slide.innerHTML = `
                        <div class="media-container">${htmlMidia}</div>
                        <div class="info">
                            <h3>${item.apresentador}</h3>
                            <p>${item.mensagem}</p>
                        </div>
                    `;
                    container.appendChild(slide);
                });

                // INICIALIZA O SWIPER APÓS CARREGAR OS DADOS
                new Swiper(".mySwiper", {
                    loop: false, // Sem loop para a pessoa saber quando termina
                    grabCursor: true, // Mostra a mãozinha no PC
                    pagination: {
                        el: ".swiper-pagination",
                        clickable: true,
                    },
                    // Removido o Autoplay para ser apenas manual
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="loading">Erro ao carregar o feed.</div>';
            }
        }

        carregarPosts();
    </script>
</body>
</html>
