<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destaques</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* 1 - FUNDO BRANCO */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #ffffff; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2 - FAIXA AZUL MARINHO NO TOPO */
        .header-faixa {
            width: 100%;
            background-color: #001f3f; /* Azul Marinho */
            color: #ffffff; /* Escrita em Branco */
            padding: 12px 0;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 3 - AJUSTE DO CARROSSEL (Lado a lado, sem "quadro" fechado) */
        .swiper { 
            width: 100%; 
            padding: 20px 0 40px 0; /* Espaço para as bolinhas */
        }

        .swiper-slide {
            width: 85%; /* Faz o próximo slide aparecer um pedacinho */
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Sombra suave */
            border: 1px solid #eee;
        }

        /* IMAGEM SEM CORTES */
        .media-container { 
            width: 100%; 
            height: 300px; 
            background: #f9f9f9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .media-container img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }

        .media-container iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        .info { 
            padding: 15px; 
            text-align: left; 
        }

        .info h3 { 
            margin: 0; 
            font-size: 1.1rem; 
            color: #001f3f; 
        }

        .info p { 
            margin: 8px 0 0; 
            color: #444; 
            font-size: 0.95rem; 
            line-height: 1.4;
        }

        /* Cor dos pontinhos de navegação */
        .swiper-pagination-bullet-active { background: #001f3f !important; }
        
        .loading { padding: 50px; text-align: center; color: #888; }
    </style>
</head>
<body>

    <div class="header-faixa">Destaques</div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="container-radio">
            <div class="loading">Carregando novidades...</div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const urlAppScript = "https://script.google.com/macros/s/AKfycbzu8XmLR4bD43EyAq3IiMlQCyy2xpUKj1vlP7Yv_oxcFzJ4Oq_7b_y2l-R0bgkOgRFj3g/exec";

        async function carregarPosts() {
            const container = document.getElementById('container-radio');
            try {
                const response = await fetch(urlAppScript);
                const dados = await response.json();

                if (!dados || dados.length === 0) {
                    container.innerHTML = '<div class="loading">Nenhuma postagem no momento.</div>';
                    return;
                }

                container.innerHTML = '';

                // Invertemos a ordem para o mais recente aparecer primeiro
                dados.reverse().forEach(item => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';

                    let linkMidia = item.link;
                    if (item.tipo === 'image') {
                        linkMidia = item.link.replace("uc?export=view&id=", "thumbnail?sz=w1000&id=");
                    }

                    const htmlMidia = item.tipo === 'video' 
                        ? `<iframe src="${item.link}" allow="autoplay"></iframe>` 
                        : `<img src="${linkMidia}" alt="Destaque">`;

                    slide.innerHTML = `
                        <div class="media-container">${htmlMidia}</div>
                        <div class="info">
                            <h3>${item.apresentador}</h3>
                            <p>${item.mensagem}</p>
                        </div>
                    `;
                    container.appendChild(slide);
                });

                // CONFIGURAÇÃO DO CARROSSEL ESTILO "NOTÍCIAS"
                new Swiper(".mySwiper", {
                    slidesPerView: "auto",      // Permite ver um pedaço do próximo slide
                    centeredSlides: true,       // Centraliza o post atual
                    spaceBetween: 15,           // Espaço entre um post e outro
                    grabCursor: true,
                    pagination: {
                        el: ".swiper-pagination",
                        clickable: true,
                    },
                });

            } catch (error) {
                container.innerHTML = '<div class="loading">Erro ao carregar o feed.</div>';
            }
        }

        carregarPosts();
    </script>
</body>
</html>
