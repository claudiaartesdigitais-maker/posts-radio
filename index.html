<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio - Posts em Tempo Real</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container do Carrossel */
        .swiper { 
            width: 100%; 
            max-width: 450px; 
            height: auto;
            border-radius: 15px;
            background: #1e1e1e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .swiper-slide {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Área da Imagem/Vídeo */
        .media-container {
            width: 100%;
            height: 400px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Preenche o espaço sem deformar */
        }

        .media-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Área do Texto */
        .content {
            padding: 20px;
            background: #fff;
            color: #333;
        }

        .content h3 {
            font-size: 1.2rem;
            color: #d32f2f; /* Vermelho Rádio */
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .content p {
            font-size: 1rem;
            line-height: 1.5;
            color: #444;
        }

        /* Controles do Swiper */
        .swiper-button-next, .swiper-button-prev { color: #fff; transform: scale(0.7); }
        .swiper-pagination-bullet-active { background: #d32f2f !important; }

        .loading {
            padding: 50px;
            text-align: center;
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="feed-container">
            <div class="swiper-slide loading">Buscando atualizações da rádio...</div>
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // SUBSTITUA PELO SEU LINK DO GOOGLE APPS SCRIPT
        const urlAppScript = "https://script.google.com/macros/s/AKfycbz3ERw84h_o1xHV0vONsKa6UaAt0XO0tni2gLDgxq9-n-oabdGtpXJeIUrFS3Lh8P2ahA/exec";

        async function carregarFeed() {
            const container = document.getElementById('feed-container');

            try {
                const response = await fetch(urlAppScript);
                const dados = await response.json();

                if (!dados || dados.length === 0) {
                    container.innerHTML = '<div class="swiper-slide loading">Nenhuma novidade hoje!</div>';
                    return;
                }

                container.innerHTML = ""; // Limpa o carregamento

                dados.forEach(item => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';

                    // Correção de link para evitar bloqueio do Google Drive
                    let linkFinal = item.link;
                    if (item.tipo === "image") {
                        linkFinal = item.link.replace("uc?export=view&id=", "thumbnail?authuser=0&sz=w1000&id=");
                    }

                    const mediaHtml = item.tipo === "video" 
                        ? `<iframe src="${linkFinal}" allow="autoplay"></iframe>`
                        : `<img src="${linkFinal}" alt="Post da Rádio">`;

                    slide.innerHTML = `
                        <div class="media-container">${mediaHtml}</div>
                        <div class="content">
                            <h3>${item.apresentador}</h3>
                            <p>${item.mensagem}</p>
                        </div>
                    `;
                    container.appendChild(slide);
                });

                // Inicia o carrossel após carregar os slides
                new Swiper(".mySwiper", {
                    loop: true,
                    pagination: { el: ".swiper-pagination", clickable: true },
                    navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
                    autoplay: { delay: 5000, disableOnInteraction: false },
                });

            } catch (error) {
                console.error("Erro ao carregar:", error);
                container.innerHTML = '<div class="swiper-slide loading">Erro ao conectar com o servidor.</div>';
            }
        }

        carregarFeed();
    </script>
</body>
</html>
