<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destaques da Rádio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .swiper { width: 100%; max-width: 450px; border-radius: 20px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .media-container { width: 100%; height: 400px; background: #000; display: flex; align-items: center; justify-content: center; }
        .media-container img { width: 100%; height: 100%; object-fit: cover; }
        .media-container iframe { width: 100%; height: 100%; border: none; }
        .info { padding: 20px; text-align: center; }
        .info h3 { margin: 0; color: #333; }
        .info p { color: #666; margin-top: 5px; }
        .loading { padding: 50px; text-align: center; color: #888; }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="container-radio">
            <div class="loading">Carregando posts...</div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // ATENÇÃO: Verifique se este link abaixo é o seu último link do "Executar" (Implantar)
        const urlAppScript = "https://script.google.com/macros/s/AKfycbz3ERw84h_o1xHV0vONsKa6UaAt0XO0tni2gLDgxq9-n-oabdGtpXJeIUrFS3Lh8P2ahA/exec";

        async function carregar() {
            const container = document.getElementById('container-radio');
            try {
                const res = await fetch(urlAppScript);
                const dados = await res.json();
                
                if (dados.length === 0) {
                    container.innerHTML = '<div class="loading">Nenhum post encontrado.</div>';
                    return;
                }

                container.innerHTML = '';
                dados.forEach(item => {
                    // Mágica para a imagem carregar: trocamos o link do Drive pelo link de miniatura (thumbnail)
                    let linkTratado = item.link.replace("uc?export=view&id=", "thumbnail?sz=w1000&id=");
                    
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    
                    const midia = item.tipo === 'video' 
                        ? `<iframe src="${item.link}"></iframe>` 
                        : `<img src="${linkTratado}" onerror="this.src='https://placehold.co/400x400?text=Erro+na+Imagem'">`;

                    slide.innerHTML = `
                        <div class="media-container">${midia}</div>
                        <div class="info">
                            <h3>${item.apresentador}</h3>
                            <p>${item.mensagem}</p>
                        </div>
                    `;
                    container.appendChild(slide);
                });

                new Swiper(".mySwiper", {
                    loop: true,
                    pagination: { el: ".swiper-pagination", clickable: true },
                    autoplay: { delay: 5000 }
                });

            } catch (e) {
                container.innerHTML = '<div class="loading">Erro ao carregar dados.</div>';
            }
        }
        carregar();
    </script>
</body>
</html>
