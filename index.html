<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Rádio</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        h2 { text-align: center; color: #1a1a1a; }

        /* Estilização do Carrossel */
        .swiper { width: 100%; max-width: 600px; height: auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: #fff; padding-bottom: 50px; }
        .swiper-slide { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; }
        
        .card-conteudo { width: 100%; text-align: center; }
        .card-conteudo img, .card-conteudo iframe { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; 
            border-radius: 20px 20px 0 0; 
            border: none;
        }
        
        .info { padding: 20px; }
        .info h3 { margin: 0; color: #333; font-size: 1.5rem; }
        .info p { color: #666; margin: 10px 0 0; font-size: 1.1rem; }

        /* Cores das setas e pontos */
        .swiper-button-next, .swiper-button-prev { color: #ff0000; }
        .swiper-pagination-bullet-active { background: #ff0000; }
        
        .loading { text-align: center; padding: 50px; font-style: italic; color: #888; }
    </style>
</head>
<body>

    <h2>📻 Destaques da Rádio</h2>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="container-radio">
            <div class="loading">Buscando atualizações da rádio...</div>
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // SEU LINK DO GOOGLE SCRIPT
        const urlAppScript = "https://script.google.com/macros/s/AKfycbx3e_d3eY_-IUx-lGogwkxJmJ8AYWQdRVHfieWhvbL8Uo5ahLARsYfgeue3nuJN3LbKSA/exec";

        async function carregarRadio() {
            try {
                const response = await fetch(urlAppScript);
                const dados = await response.json();
                const container = document.getElementById('container-radio');

                if (dados.length === 0) {
                    container.innerHTML = '<div class="loading">Nenhuma postagem encontrada.</div>';
                    return;
                }

                container.innerHTML = ""; // Limpa o carregando

                dados.forEach(item => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    
                    // Verifica se é vídeo ou imagem
                    const midia = item.tipo === "video" 
                        ? `<iframe src="${item.link}" allow="autoplay"></iframe>`
                        : `<img src="${item.link}" alt="${item.apresentador}">`;

                    slide.innerHTML = `
                        <div class="card-conteudo">
                            ${midia}
                            <div class="info">
                                <h3>${item.apresentador}</h3>
                                <p>${item.mensagem}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(slide);
                });

                // Inicia o Swiper
