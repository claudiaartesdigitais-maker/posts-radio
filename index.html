<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Destaques da Rádio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 0; }
        
        .header-faixa { width: 100%; padding: 15px 18px 8px 18px; font-size: 22px; font-weight: 900; color: #001a33; text-transform: uppercase; display: flex; align-items: center; gap: 10px; box-sizing: border-box; }
        .header-faixa::before { content: ''; width: 5px; height: 22px; background: #d32f2f; border-radius: 2px; }

        .swiper { width: 100%; padding: 10px 0 50px 0; }
        .swiper-slide { width: 90%; max-width: 400px; display: flex; flex-direction: column; background: #fff; }
        
        /* Imagens Grandes e Fundo Branco */
        .media-container { width: 100%; background: #ffffff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .media-container img, .media-container video { width: 100%; height: auto; max-height: 75vh; object-fit: contain; display: block; border-radius: 15px; }

        .info { padding: 15px 5px; position: relative; }
        .info h3 { margin: 0; font-size: 14px; font-weight: 800; color: #d32f2f; text-transform: uppercase; }
        .info p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: #001a33; padding-right: 50px; line-height: 1.3; }

        /* Curtir */
        .like-container { position: absolute; right: 5px; top: 15px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .like-btn { font-size: 1.8rem; color: #ccc; }
        .like-btn.active { color: #d32f2f; }
        .like-count { font-size: 0.8rem; color: #666; font-weight: bold; }
        
        .swiper-pagination-bullet-active { background: #d32f2f !important; }
    </style>
</head>
<body>

    <div class="header-faixa">Destaques da Semana</div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="container-radio"></div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const urlAppScript = "https://script.google.com/macros/s/AKfycbxNzDvifH0pv74i5E7BUS-scdfujI7mRLymYcOmCJDN3JH4AeGAThfHZoGDt2xS228zWw/exec?aba=Respostas ao formulário 1";

        async function curtir(linha, btnElement) {
            const countElement = btnElement.nextElementSibling;
            if(btnElement.classList.contains('active')) return;
            btnElement.classList.add('active');
            btnElement.innerHTML = "❤️";
            try {
                await fetch(urlAppScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ linha: linha }) });
                countElement.innerText = parseInt(countElement.innerText) + 1;
            } catch (e) {}
        }

        async function carregarPosts() {
            const container = document.getElementById('container-radio');
            try {
                const response = await fetch(urlAppScript);
                const dados = await response.json();
                
                // Filtro de 7 dias
                const limite = 7 * 24 * 60 * 60 * 1000;
                const agora = new Date().getTime();

                container.innerHTML = dados.reverse().filter(item => {
                    return (agora - new Date(item.data).getTime()) <= limite;
                }).map(item => {
                    const arquivo = (item.arquivo || item.link || "").trim();
                    
                    // Identifica se o que veio do formulário é vídeo (mp4, mov, etc)
                    const eVideo = /\.(mp4|mov|webm|ogg)$/i.test(arquivo) || item.tipo === 'video';
                    
                    let midiaHtml = eVideo ? 
                        `<video src="${arquivo}" controls playsinline></video>` : 
                        `<img src="${arquivo.includes('drive.google.com') ? `https://drive.google.com/thumbnail?id=${arquivo.match(/[-\w]{25,}/)[0]}&sz=w1000` : arquivo}">`;

                    return `
                        <div class="swiper-slide">
                            <div class="media-container">${midiaHtml}</div>
                            <div class="info">
                                <h3>${item.apresentador || ""}</h3>
                                <p>${item.mensagem || ""}</p>
                                <div class="like-container" onclick="curtir(${item.id || item.linha}, this.querySelector('.like-btn'))">
                                    <span class="like-btn">🤍</span>
                                    <span class="like-count">${item.curtidas || 0}</span>
                                </div>
                            </div>
                        </div>`;
                }).join('');

                new Swiper(".mySwiper", { 
                    slidesPerView: "auto", 
                    centeredSlides: true, 
                    spaceBetween: 15, 
                    grabCursor: true,
                    pagination: { el: ".swiper-pagination", clickable: true } 
                });
            } catch (error) { console.error(error); }
        }
        carregarPosts();
    </script>
</body>
</html>
