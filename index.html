<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* --- SEU ESTILO ORIGINAL (NOTÍCIAS 24H) --- INTACTO */
        body, html { margin: 0; padding: 0; background: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        .mural-titulo { padding: 15px 18px 8px 18px; font-size: 22px; font-weight: 900; color: #001a33; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .mural-titulo::before { content: ''; width: 5px; height: 22px; background: #d32f2f; border-radius: 2px; }
        .feed-container { display: flex; flex-direction: row; overflow-x: auto; padding: 10px 15px 35px 15px; gap: 18px; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .card { flex: 0 0 300px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.12); text-decoration: none; color: #333; height: 400px; display: flex; flex-direction: column; border: 1px solid #eee; overflow: hidden; }
        .thumb-container { width: 100%; height: 200px; background: #000; overflow: hidden; }
        .thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
        .corpo { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .tipo { font-size: 12px; color: #d32f2f; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
        .titulo { font-size: 18px; font-weight: bold; line-height: 1.4; color: #001a33; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- ESTILOS DESTAQUES --- */
        .barra-azul { width: 100%; height: 15px; background-color: #001f3f; }
        .swiper { width: 100%; padding-bottom: 10px; background: #fff; }
        .swiper-slide { width: 88%; max-width: 420px; display: flex; flex-direction: column; background: #fff; }
        .media-destaque { width: 100%; background: #000; border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 200px; }
        .media-destaque img { width: 100%; height: auto; display: block; object-fit: contain; }
        .media-destaque video { width: 100%; max-height: 70vh; display: block; background: #000; }

        .info-destaque { padding: 18px 5px; position: relative; }
        .titulo-c { font-size: 20px; font-weight: 800; color: #001a33; text-transform: uppercase; display: block; margin-bottom: 6px; }
        .apresentador-destaque { margin: 0; font-size: 14px; font-weight: 700; color: #d32f2f; text-transform: uppercase; }
        .msg-destaque { margin: 12px 0 0; font-size: 17px; font-weight: 500; color: #333; padding-right: 60px; line-height: 1.5; }
        .like-container { position: absolute; right: 5px; top: 18px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .like-btn { font-size: 2rem; color: #ccc; }
        .like-btn.active { color: #d32f2f; }
        .like-count { font-size: 0.9rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div class="mural-titulo">Notícias 24 horas</div>
    <div id="lista" class="feed-container"></div>

    <div class="barra-azul"></div>
    <div class="mural-titulo">Destaques da Semana</div>
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="container-destaques"></div>
    </div>
    <div class="barra-azul"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // --- SUA FUNÇÃO ORIGINAL CARREGAR() (NOTÍCIAS 24H) ---
        async function carregar() {
            const url = "https://script.google.com/macros/s/AKfycbzvxO4A4LuJPluxrGANlxSWTWHN3ZxU2UgcveW-3wZaIAUS_xLYrCd1LcGbpjMoc6Wa/exec";
            const imgMuralPadrao = "https://raw.githubusercontent.com/claudiaartesdigitais-maker/adm-radio/main/mural.png?t=" + new Date().getTime();
            try {
                const res = await fetch(url);
                const dados = await res.json(); 
                const container = document.getElementById('lista');
                const agora = new Date().getTime();
                const filtradas = dados.filter(item => {
                    if(!item.data) return false;
                    return (agora - new Date(item.data).getTime()) < 86400000;
                });
                if (filtradas.length === 0) {
                    container.innerHTML = "<p style='padding:50px; color:#999; text-align:center; width:100%; font-size:16px;'>Sem novidades nas últimas 24h.</p>";
                    return;
                }
                container.innerHTML = filtradas.reverse().map(item => {
                    const linkOriginal = (item.link || "").trim();
                    const linkLower = linkOriginal.toLowerCase();
                    const ytMatch = linkOriginal.match(/(?:youtu\.be\/|v\/|u\/\w\/|embed\/|shorts\/|live\/|watch\?v=|\&v=)([^#\&\?]*).*/);
                    const ytId = ytMatch ? ytMatch[1] : null;
                    let imgFinal;
                    if (linkLower.includes("facebook") || linkLower.includes("fb.watch") || linkLower.includes("fb.com") || linkLower.includes("instagram") || linkLower.includes("tiktok") || linkLower.includes("kwai")) {
                        imgFinal = imgMuralPadrao;
                    } else if (ytId) {
                        imgFinal = `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
                    } else if (item.capa && item.capa.trim().length > 15 && item.capa.startsWith('http')) {
                        imgFinal = item.capa;
                    } else {
                        imgFinal = imgMuralPadrao;
                    }
                    return `<a href="${linkOriginal}" target="_blank" class="card">
                            <div class="thumb-container"><img src="${imgFinal}" class="thumb" onerror="this.src='${imgMuralPadrao}'"></div>
                            <div class="corpo">
                                <span class="tipo">⌚ ${(item.tipo || 'Destaque')}</span>
                                <div class="titulo">${item.titulo}</div>
                            </div>
                        </a>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        // --- FUNÇÃO DESTAQUES (DETECÇÃO PELA COLUNA F) ---
        async function carregarDestaques() {
            const urlDestaques = "https://script.google.com/macros/s/AKfycbxNzDvifH0pv74i5E7BUS-scdfujI7mRLymYcOmCJDN3JH4AeGAThfHZoGDt2xS228zWw/exec?aba=Respostas ao formulário 1";
            try {
                const res = await fetch(urlDestaques);
                const dados = await res.json();
                const agora = new Date().getTime();
                
                const html = dados.reverse().filter(item => {
                    if(!item.data) return false;
                    return (agora - new Date(item.data).getTime()) <= (7 * 24 * 60 * 60 * 1000);
                }).map(item => {
                    const arquivo = (item.arquivo || "").trim();
                    
                    // NOVA LÓGICA: Se a Coluna F (reconhecida como 'tipo' ou 'formato' pelo script) 
                    // ou se o link tiver indícios de vídeo, ele abre como vídeo.
                    const ehVideo = item.tipo_arquivo === "video" || item.formato === "video" || /\.(mp4|webm|mov|ogg)$/i.test(arquivo) || arquivo.includes("video");
                    
                    let midiaHtml = ehVideo ? 
                        `<div class="media-destaque">
                            <video src="${arquivo}" controls playsinline preload="metadata"></video>
                         </div>` : 
                        `<div class="media-destaque">
                            <img src="${arquivo.includes('drive.google.com') ? `https://drive.google.com/thumbnail?id=${arquivo.match(/[-\w]{25,}/)[0]}&sz=w1000` : arquivo}">
                         </div>`;

                    return `
                        <div class="swiper-slide">
                            ${midiaHtml}
                            <div class="info-destaque">
                                <span class="titulo-c">${item.titulo || ""}</span>
                                <h3 class="apresentador-destaque">${item.apresentador || ""}</h3>
                                <p class="msg-destaque">${item.mensagem || ""}</p>
                                <div class="like-container" onclick="curtirDestaque(${item.id || item.linha}, this.querySelector('.like-btn'))">
                                    <span class="like-btn">🤍</span>
                                    <span class="like-count">${item.curtidas || 0}</span>
                                </div>
                            </div>
                        </div>`;
                }).join('');
                
                document.getElementById('container-destaques').innerHTML = html || "<p style='padding:50px; color:#999; text-align:center; width:100%;'>Sem destaques para esta semana.</p>";
                new Swiper(".mySwiper", { slidesPerView: "auto", centeredSlides: true, spaceBetween: 20, grabCursor: true });
            } catch (e) { console.error(e); }
        }

        async function curtirDestaque(linha, btn) {
            if(btn.classList.contains('active')) return;
            btn.classList.add('active'); btn.innerHTML = "❤️";
            const count = btn.nextElementSibling;
            count.innerText = parseInt(count.innerText) + 1;
            fetch("https://script.google.com/macros/s/AKfycbxNzDvifH0pv74i5E7BUS-scdfujI7mRLymYcOmCJDN3JH4AeGAThfHZoGDt2xS228zWw/exec?aba=Respostas ao formulário 1", { method: 'POST', mode: 'no-cors', body: JSON.stringify({ linha: linha }) });
        }

        carregar();
        carregarDestaques();
    </script>
</body>
</html>
